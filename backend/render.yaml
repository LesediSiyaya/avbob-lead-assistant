services:
  - type: web
    name: avbob-lead-assistant
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false          # set manually in Render dashboard
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: USE_OLLAMA
        value: "false"
      - key: DB_PATH
        value: /data/avbob_leads.db
    disk:
      name: avbob-data
      mountPath: /data
      sizeGB: 1
