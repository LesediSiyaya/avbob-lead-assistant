<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AVBOB Lead Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      min-height: 480px;
      background: #0D1117;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      color: #e2e8f0;
    }

    /* ── Header ──────────────────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, #0D1117, #1a2233);
      padding: 14px 16px 10px;
      border-bottom: 2px solid #D4AF37;
    }
    .header-top { display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 15px; font-weight: 800; color: #D4AF37; letter-spacing: 0.5px; }
    .status-dot {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: #94a3b8;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #4b5563; transition: background 0.3s;
    }
    .dot.online  { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .dot.offline { background: #ef4444; }
    .subtitle { color: #64748b; font-size: 11px; margin-top: 3px; }

    /* ── Stats row ───────────────────────────────────────────── */
    .stats {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1px; background: #1e2d45;
      border-bottom: 1px solid #1e2d45;
    }
    .stat {
      background: #141c2b; padding: 10px 8px; text-align: center;
    }
    .stat-val { font-size: 22px; font-weight: 800; color: #D4AF37; line-height: 1; }
    .stat-lbl { font-size: 10px; color: #64748b; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* ── Section header ──────────────────────────────────────── */
    .section {
      padding: 8px 14px 4px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .section-title { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.8px; }
    .section-action { font-size: 11px; color: #D4AF37; cursor: pointer; background: none; border: none; }
    .section-action:hover { text-decoration: underline; }

    /* ── Lead list ───────────────────────────────────────────── */
    .leads-list {
      max-height: 230px; overflow-y: auto;
      border-bottom: 1px solid #1e2d45;
    }
    .lead-item {
      padding: 9px 14px; border-bottom: 1px solid #1a2233;
      cursor: pointer; transition: background 0.12s;
    }
    .lead-item:hover { background: #141c2b; }
    .lead-item:last-child { border-bottom: none; }

    .lead-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .lead-author { font-weight: 600; color: #e2e8f0; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 170px; }
    .lead-score { font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .lead-text { color: #64748b; font-size: 11px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lead-meta { display: flex; gap: 5px; margin-top: 4px; flex-wrap: wrap; }

    .badge {
      font-size: 9px; padding: 2px 7px; border-radius: 10px;
      font-weight: 700; letter-spacing: 0.3px; text-transform: uppercase;
    }
    .badge-new        { background: #1e3a5f; color: #60a5fa; }
    .badge-contacted  { background: #1c3d2a; color: #4ade80; }
    .badge-follow-up  { background: #3d2a1c; color: #fb923c; }
    .badge-converted  { background: #2a1c3d; color: #c084fc; }
    .badge-source     { background: #1e293b; color: #94a3b8; }

    .score-high { color: #22c55e; }
    .score-mid  { color: #eab308; }
    .score-low  { color: #ef4444; }

    /* ── Empty / loading state ───────────────────────────────── */
    .empty {
      padding: 24px 14px; text-align: center; color: #4b5563; font-size: 12px;
    }
    .empty-icon { font-size: 28px; margin-bottom: 6px; }
    .spinner-wrap { padding: 20px; text-align: center; }
    .mini-spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 2px solid #1e2d45; border-top-color: #D4AF37;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Settings ────────────────────────────────────────────── */
    .settings-toggle {
      width: 100%; padding: 7px 14px; background: none; border: none;
      border-bottom: 1px solid #1e2d45; color: #64748b;
      text-align: left; cursor: pointer; font-size: 11px; font-family: inherit;
    }
    .settings-toggle:hover { background: #141c2b; }

    .settings-panel {
      display: none; padding: 10px 14px 12px;
      border-bottom: 1px solid #1e2d45; background: #0a0f1a;
    }
    .settings-panel.open { display: block; }
    .settings-label { font-size: 10px; color: #64748b; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.5px; }
    .settings-row { display: flex; gap: 6px; }
    .settings-input {
      flex: 1; padding: 6px 10px; background: #141c2b; border: 1px solid #1e2d45;
      border-radius: 6px; color: #e2e8f0; font-size: 12px; font-family: inherit;
      outline: none;
    }
    .settings-input:focus { border-color: #D4AF37; }
    .settings-save {
      padding: 6px 12px; background: #D4AF37; border: none; border-radius: 6px;
      color: #0D1117; font-weight: 700; font-size: 12px; cursor: pointer;
    }
    .settings-save:hover { background: #c9a227; }
    .settings-hint { font-size: 10px; color: #4b5563; margin-top: 5px; }

    /* ── Footer ──────────────────────────────────────────────── */
    .footer { padding: 10px 14px; display: flex; gap: 6px; }
    .footer-btn {
      flex: 1; padding: 8px; border-radius: 7px; border: 1px solid #1e2d45;
      background: #141c2b; color: #94a3b8; font-size: 11px;
      cursor: pointer; font-family: inherit; font-weight: 600;
      transition: all 0.15s;
    }
    .footer-btn:hover { border-color: #D4AF37; color: #D4AF37; }
    .footer-btn.primary { background: #D4AF37; color: #0D1117; border-color: #D4AF37; }
    .footer-btn.primary:hover { background: #c9a227; }

    /* ── Lead detail modal overlay ───────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #141c2b; border: 1px solid #1e2d45;
      border-radius: 10px; width: 330px; max-height: 400px;
      overflow-y: auto; padding: 16px;
    }
    .modal-title { font-weight: 700; color: #D4AF37; margin-bottom: 10px; font-size: 14px; }
    .modal-field { margin-bottom: 8px; }
    .modal-field-lbl { font-size: 10px; color: #64748b; text-transform: uppercase; margin-bottom: 3px; }
    .modal-field-val { font-size: 12px; color: #e2e8f0; background: #0D1117; padding: 6px 9px; border-radius: 5px; word-break: break-all; }
    .status-select {
      width: 100%; padding: 6px 9px; background: #0D1117; border: 1px solid #1e2d45;
      border-radius: 5px; color: #e2e8f0; font-size: 12px;
    }
    .modal-close {
      width: 100%; margin-top: 10px; padding: 7px; background: #1e2d45;
      border: none; border-radius: 6px; color: #94a3b8; cursor: pointer;
      font-size: 12px; font-family: inherit;
    }
  </style>
</head>
<body>
  <!-- ── Header ──────────────────────────────────────────────── -->
  <div class="header">
    <div class="header-top">
      <div class="logo">🤝 AVBOB Lead Assistant</div>
      <div class="status-dot">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">Checking…</span>
      </div>
    </div>
    <div class="subtitle">AI Lead Generation for AVBOB Consultants</div>
  </div>

  <!-- ── Stats ───────────────────────────────────────────────── -->
  <div class="stats">
    <div class="stat">
      <div class="stat-val" id="statTotal">–</div>
      <div class="stat-lbl">Total</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statNew">–</div>
      <div class="stat-lbl">New</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statConverted">–</div>
      <div class="stat-lbl">Converted</div>
    </div>
  </div>

  <!-- ── Leads ───────────────────────────────────────────────── -->
  <div class="section">
    <span class="section-title">Recent Leads</span>
    <button class="section-action" id="refreshBtn">↻ Refresh</button>
  </div>
  <div class="leads-list" id="leadsList">
    <div class="spinner-wrap"><div class="mini-spinner"></div></div>
  </div>

  <!-- ── Settings ────────────────────────────────────────────── -->
  <button class="settings-toggle" id="settingsToggle">⚙️ Settings &amp; Backend URL</button>
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-label">Backend URL</div>
    <div class="settings-row">
      <input class="settings-input" id="backendUrlInput" placeholder="http://localhost:8000" />
      <button class="settings-save" id="saveUrlBtn">Save</button>
    </div>
    <div class="settings-hint" id="settingsHint">Enter your backend server URL</div>
  </div>

  <!-- ── Footer ──────────────────────────────────────────────── -->
  <div class="footer">
    <button class="footer-btn" id="openFbBtn">📘 Open Facebook</button>
    <button class="footer-btn primary" id="openDashBtn">📊 Full Dashboard</button>
  </div>

  <!-- ── Lead detail modal ───────────────────────────────────── -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
